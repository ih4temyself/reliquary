services:
  db:
    image: postgres:16
    container_name: reliquary-db
    environment:
      POSTGRES_DB: reliquary
      POSTGRES_USER: reliquary
      POSTGRES_PASSWORD: reliquary
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reliquary"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
