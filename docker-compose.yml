services:
  db:
    image: postgres:16
    container_name: reliquary-db
    environment:
      POSTGRES_DB: reliquary
      POSTGRES_USER: reliquary
      POSTGRES_PASSWORD: reliquary
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reliquary"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: reliquary-backend
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: dev-insecure-change-me
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://reliquary:reliquary@db:5432/reliquary
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      MAX_UPLOAD_SIZE: "1073741824"
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-239880984549-0v5ev18c0hu9u8tqcv5gavkmtg0223fr.apps.googleusercontent.com}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: reliquary-frontend
    environment:
      VITE_USE_POLLING: "1"
      PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-239880984549-0v5ev18c0hu9u8tqcv5gavkmtg0223fr.apps.googleusercontent.com}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  backend_venv:
  frontend_node_modules:
